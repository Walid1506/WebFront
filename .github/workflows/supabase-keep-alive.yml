name: Supabase Keep Alive

on:
  schedule:
    # Toutes les 3 jours à 8h UTC (Supabase pause après 7 jours d'inactivité)
    - cron: '0 8 */3 * *'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "Status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Ping failed with status $STATUS"
            exit 1
          fi
          echo "Supabase is alive!"
